<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Personal Details</legend>
            Username : <input type="text" name="username">      <br><br>
            Password : <input type="password" name="password">  <br><br>
            Email    : <input type="email" name="email">         <br><br>
            Age      : <input type="number" name="age">       <br><br>
        </fieldset>
        <fieldset>
            <legend>Education Details</legend>
            Mobile   : <input type="tel" name="mobile">        <br><br>
            DOB      : <input type="date" name="dob">          <br><br>
            Month    : <input type="month" name="month">       <br><br>
            Time     : <input type="time" name="time">       <br><br>
        </fieldset>
        <fieldset>
            <legend>Experience Details</legend>
            Week     : <input type="week" name="week">       <br><br>
            Resume   : <input type="file" name="resume">     <br><br>
            Gender   : <input type="radio" name="gender" value="male"> male      
                        <input type="radio" name="gender" value="female"> female  <br><br>  
            Languages : <input type="checkbox" name="lang" value="English">English  
                        <input type="checkbox" name="lang" value="hindi">Hindi      <br><br>
        </fieldset>
        <fieldset>
            volume     : <input type="range" name="volume">         <br><br>
            Search     : <input type="search" name="search">        <br><br>
            Hidden     : <input type="hidden" name="deptno" value="30"> <br><br>
            URL        : <input type="url" name="url">  <br><br>
            Color      : <input type="color" name="color">  <br><br>
        </fieldset>

        <input type="reset">
        <button>Submit</button>
        <!-- <input type="button" value="submit"> -->
        <!-- <input type="submit"> -->
        <!-- <input type="image" height="50" width="50" src="https://cdn.pixabay.com/photo/2017/06/23/09/01/enter-2434002_1280.jpg"> -->
    </form>

    <br><br><br><br><br><br><br><br><br>
</body>
</html>
