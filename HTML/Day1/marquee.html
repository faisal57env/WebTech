<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <marquee direction="right" behavior="alternate" scrollamount="40">
        <h1>Marquee Tag</h1>
    </marquee>
    <marquee behavior="alternate">
        <p>
            It will make the content to scroll on the webpage.
            Its attributes are direction, scrollamount,behavior.
        </p>
    </marquee>
    <hr>
    <marquee direction="left">Hello world</marquee>
    <hr>
    <marquee direction="right">Hello world</marquee>
    <hr>
    <marquee direction="up">Hello world</marquee>
    <hr>
    <marquee direction="down">Hello world</marquee>
    <hr>
    <marquee direction="right" scrollamount="100">Hello world</marquee>
    <hr>
    <marquee behavior="alternate" scrollamount="30">ALTERNATE</marquee>
    <hr>
    <marquee behavior="slide" direction="right" scrollamount="30">SLIDE</marquee>
    <hr>
    <marquee direction="right" behavior="scroll" scrollamount="30">SCROLL</marquee>


    <br><br><br><br><br><br><br><br><br>
</body>
</html>
