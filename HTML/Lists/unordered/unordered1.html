<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Unordered List</h1>
    <ul type="disc">
        <li>John</li>
        <li>Smith</li>
        <li>Miller</li>
        <li>Allen</li>
    </ul>
    <hr>
    <ul type="circle">
        <li>John</li>
        <li>Smith</li>
        <li>Miller</li>
        <li>Allen</li>
    </ul>
    <hr>
    <ul type="square">
        <li>John</li>
        <li>Smith</li>
        <li>Miller</li>
        <li>Allen</li>
    </ul>
    <hr>
    <ul type="none">
        <li>John</li>
        <li>Smith</li>
        <li>Miller</li>
        <li>Allen</li>
    </ul>
</body>
</html>
