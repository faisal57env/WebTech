<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #div1,#div2,#div3{
            height: 200px;
            width: 200px;
            border: 3px solid;
            border-radius: 20px;
            transition: all 1s;
        }
        .parent{
            display: flex;
            justify-content: space-around;
        }
        #div1{
            background: linear-gradient(45deg,violet,indigo,blue,green,yellow,orange,red);
        }
        #div2{
            background: radial-gradient(violet,indigo,blue,green,yellow,orange,red);
        }
        #div3{
            background-image: conic-gradient(violet,indigo,blue,green,yellow,orange,red);
        }
        h1{
            background: linear-gradient(90deg, #C77BF4 0%, #FF5672 100%);
            text-align: center;
            padding: 10px;
        }
        #div1:hover,#div2:hover,#div3:hover{
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <h1>Gradients</h1>
    <div class="parent">
        <div id="div1"></div>
        <div id="div2"></div>
        <div id="div3"></div>
    </div>
    <div class="parent">
        <p>linear-gradient</p>
        <p>radial-gradient</p>
        <p>conic-gradient</p>
    </div>
    
</body>
</html>
