<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img:hover{
            filter: blur(5px);
            filter: brightness(200%);
            filter: contrast(150%);
            filter: drop-shadow(10px 10px 10px grey);
            filter: grayscale(100%);
            filter: hue-rotate(90deg);
            filter: invert(100%);
            filter: opacity(0.5);
            filter: saturate(200%);
            filter: sepia(150%);
            filter: hue-rotate(90deg) saturate(200%);
            transform: rotate(45deg) scale(1.2);
        }
    </style>
</head>
<body>
    <div>
        <img height="400" width="400" src="https://cdn.pixabay.com/photo/2026/05/09/07/40/07-40-44-561_1280.jpg" alt="">
    </div>
</body>
</html>
