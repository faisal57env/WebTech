<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      nav a {
        position: relative;
        text-decoration: none;
        color: black;
        margin-right: 20px;
      }
      nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -5px;
        width: 0;
        height: 2px;
        background: blue;
        transition: width 0.3s;
      }
      nav a:hover::after {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
    </nav>
  </body>
</html>
