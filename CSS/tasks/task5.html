<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .input-group {
        position: relative;
      }

      label {
        position: absolute;
        left: 10px;
        top: 0px;
        transition: 0.3s;
      }

      input:focus + label,
      input:valid + label {
        top: -15px;
        font-size: 12px;
        color: blue;
      }
    </style>
  </head>
  <body>
    <br><br>
    <div class="input-group">
      <input type="text" required />
      <label>Name</label>
    </div>
  </body>
</html>
