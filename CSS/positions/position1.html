<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            height: 400px;
            width: 400px;
            border: 3px solid red;
            margin: auto;
            color: white;
            font-size: 30px;
            position: relative;
        }
        #child1{
            height: 100px;
            width: 100px;
            background-color: blue;
            position: absolute;
            bottom: 0px;
            left: 0px;
        }
        #child2{
            height: 100px;
            width: 100px;
            background-color: green;
            position: absolute;
            bottom: 0px;
            right: 0px;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div id="child1">Child1</div>
        <div id="child2">Child2</div>
    </div>
</body>
</html>
