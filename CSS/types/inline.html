<body>
    <h1>Inline CSS</h1>
    <p>
        Inside the opening tag we write the style attribute and write all the css properties.
    </p>
    

    <!-- 
        * - multiple
        > - child
        + - sibling
        # - id
        $ - numbers in sequence
        . - class 
        {} - same content
        
    --> 
   
    table>thead>tr>th*3{table Heading}^^tbody>tr*3>td*3{table data}^^tfoot>tr>td*3{table footer}




</body>
</html>
