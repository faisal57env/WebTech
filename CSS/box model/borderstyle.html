<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{padding: 10px;margin: 10px;border-width: 4px;}
        #div1{border-style: solid;}
        #div2{border-style: dotted;}
        #div3{border-style: dashed;}
        #div4{border-style: double;}
        #div5{border-style: inset;}
        #div6{border-style: outset;}
        #div7{border-style: ridge;}
        #div8{border-style: groove;}
        #div9{border-style: solid dotted dashed double;}
        #div10{border-style: solid dotted double;}
        #div11{border-style: solid double;}
        button{border: none;}
    </style>
</head>
<body>
    <div id="div1">border-style: solid;</div>
    <div id="div2">border-style: dotted;</div>
    <div id="div3">border-style: dashed;</div>
    <div id="div4">border-style: double;</div>
    <div id="div5">border-style: inset;</div>
    <div id="div6">border-style: outset;</div>
    <div id="div7">border-style: ridge;</div>
    <div id="div8">border-style: groove;</div>
    <button>click</button>
    <div id="div9">border-style: solid dotted dashed double;</div>
    <div id="div10">border-style: solid dotted double;</div>
    <div id="div11">border-style: solid double;</div>


    <br><br><br><br><br><br><br><br><br>
</body>
</html>
