<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 300px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            background-color: red;
        }
        #div2{
            background-color: green;
            position: absolute;
            top: 20px;
            left: 60px;
        }
        #div3{
            background-color: blue;
            position: absolute;
            top: 40px;
            left: 150px;
        }
    </style>
</head>
<body>
    <div id="div1">div1</div>
    <div id="div2">div2</div>
    <div id="div3">div3</div>
</body>
</html>
