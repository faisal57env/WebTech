<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p:last-of-type{
            color: red;
        }
    </style>
</head>
<body>
    <h1>last-of-type pseudo class selector.</h1>
    <p>It will target the last occurance of specified tag inside parent element.</p>
    <div>
        <h1>first-child , first-of-type , last-of type</h1>
        <p>first-of-type , last-of type</p>
        <img src="" alt="first-of-type , last-of type">
        <span>
            <h1>first-child , first-of-type </h1>
            <p>first-of-type</p>
            <h1>last-of type</h1>
            <a href="">first-of-type , last-of type</a>
            <p>last-child , last-of type</p>
        </span>
    </div>
</body>
</html>
