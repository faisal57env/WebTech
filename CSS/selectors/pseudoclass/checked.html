<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .radio:checked{
            accent-color: red;
        }
        .checkbox:checked{
            accent-color: green;
        }
    </style>
</head>
<body>
    <h1>checked pseudo class selector</h1>
    <p>It is used to target the checked state of radio / checkbox.</p>
    <input type="radio" class="radio">Male
    <input type="radio" class="radio">Female
    <br><br>
    <input type="checkbox" class="checkbox">English
    <input type="checkbox" class="checkbox">Hindi
</body>
</html>
