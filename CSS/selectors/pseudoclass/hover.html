<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button:hover{
            background-color: blue;
            color: white;
        }
        #red:hover{
            background-color: red;
        }
        #green:hover{
            background-color: green;
        }
        #blue:hover{
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>hover pseudo class selector</h1>
    <p>it is used ot target the hover state of any element.</p>
    <p>when  user place the cursor on the element then we can say that the element is in hover state.</p>
    <button>click</button>
    <ul>
        <li id="red">red</li>
        <li id="green">green</li>
        <li id="blue">blue</li>
    </ul>
</body>
</html>
