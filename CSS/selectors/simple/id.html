<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #item1{background-color: red;}
        #item2{background-color: blue;}
        #item3{background-color: yellow;}
        #item4{background-color: green;}
        #item5{background-color: blueviolet;}

        #td1{background-color: red;}
        #td2{background-color: green;}
        #td3{background-color: blue;}
    </style>
</head>
<body>
    <h1>Id selector</h1>
    <p>It is used to target only 1 element.</p>
    <p>Id must be represented with #.</p>
    <p>Id must be unique.</p>
    <p>An element can have only 1 id.</p>
    <p>Id have the highest priority.</p>
    <ul>
        <li id="item1">list items</li>
        <li id="item2">list items</li>
        <li id="item3">list items</li>
        <li id="item4">list items</li>
        <li id="item5">list items</li>
    </ul>
    <table border="5" cellpadding="20">
        <tbody>
            <tr>
                <td id="td1">red</td>
                <td id="td2">green</td>
                <td id="td3">blue</td>
            </tr>
            <tr>
                <td>yellow</td>
                <td>orange</td>
                <td>blueviolet</td>
            </tr>
        </tbody>
    </table>


    
</body>
</html>
