<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div h1{ color: red;} /*targets all direct+indirect h1 tags in div */
        div p{color: blue;} /* targets all direct+indirect p tags in all divs*/
    </style>
</head>
<body>
    <h1>descendant combinator selector</h1>
    <p>It is used to target all the direct and indirect members of the specified tag.</p>
    <p>it is represented with space.</p>
    <div>
        <h1>direct member of div</h1>
        <p>direct member of div</p>
        <span>
            <h1>indirect member of div</h1>
            <p>indirect member of div</p>
        </span>
    </div>
</body>
</html>
