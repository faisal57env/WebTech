<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a::before{
            content: 'hello';
        }
    </style>
</head>
<body>
    <h1>before pseudo element-selector</h1>
    <p>It is used to add the content before the content of any element.</p>
    
    <a href="">click</a>
</body>
</html>
