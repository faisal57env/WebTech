<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1::selection,p::selection{
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Selection pseudo element-selector</h1>
    <p>It is used to apply the styles only when user selects the text.</p>
    
</body>
</html>
