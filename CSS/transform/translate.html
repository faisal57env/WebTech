<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: red;
            font-size: 50px;
            color: white;
            transition: all 2s;
            margin: auto;
        }
        #div2{background-color: blue;}
        #div3{background-color: green;}
        #div4{background-color: orange;}
        #div1:hover{transform: translate(100px);}
        #div2:hover{transform: translate(100px,100px);}
        #div3:hover{transform: translateX(100px);}
        #div4:hover{transform: translateY(100px);}
    </style>
</head>
<body>
    <div id="div1">div1</div>
    <div id="div2">div2</div>
    <div id="div3">div3</div>
    <div id="div4">div4</div>
</body>
</html>
