<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            display: flex;
            justify-content: space-around;
            font-size: 30px;
            font-family: sans-serif;
        }
        #div1,#div2,#div3,#div4{
            height: 200px;
            width: 200px;
            background-color: red;
            font-size: 50px;
            color: white;
            transition: all 2s;
        }
        #div2{background-color: blue;}
        #div3{background-color: green;}
        #div4{background-color: orange;}
        #div1:hover{transform: rotate(45deg);}
        #div2:hover{transform: rotate(-45deg);}
        #div3:hover{transform: rotateX(360deg);}
        #div4:hover{transform: rotateY(360deg);}
    </style>
</head>
<body>
    <h1>rotate()</h1>
   <div class="parent">
        <div id="div1">div1</div>
        <div id="div2">div2</div>
        <div id="div3">div3</div>
        <div id="div4">div4</div>
   </div>
   <div class="parent">
    <p> rotate(45deg)</p>
    <p> rotate(-45deg)</p>
    <p> rotateX(360deg)</p>
    <p> rotateY(360deg)</p>
   </div>
</body>
</html>
