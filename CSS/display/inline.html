<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div,li{
            border: 2px solid red;
            display: inline;
        }
    </style>
</head>
<body>
    <h1>display:inline; property</h1>
    <p>It converts the block level elements into inline level elements.</p>
    <div>Hello</div>
    <div>World</div>
    <ul>
        <li>list item1</li>
        <li>list item2</li>
        <li>list item3</li>
        <li>list item4</li>
        <li>list item5</li>
    </ul>
</body>
</html>
