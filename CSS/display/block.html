<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span{
            border: 2px solid red;
            display: block;
        }
    </style>
</head>
<body>
    <h1>display:block; property</h1>
    <p>It converts the inline level elements into block level elements.</p>
    <span>Hello</span>
    <span>World</span>
  
</body>
</html>
