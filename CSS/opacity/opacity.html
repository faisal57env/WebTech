<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: red;
            position: absolute;
            top: 0px;
            left: 0px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>Opacity property</h1>
    <p>it is used to give the transparency to the element.</p>
    <p>It's value must be between 0 - 1.</p>
    <p>If we give 0 , element will get full tranparency</p>
    <p>If we give 1, no transparency</p>
    <div></div>
</body>
</html>
