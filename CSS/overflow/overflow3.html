<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 3px solid red;
            width: 200px;
            height: 200px;
            overflow: hidden;
        }
        img{
            transition: all 1s;
        }
        img:hover{
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div>
        <img height="200" width="200" src="https://cdn.pixabay.com/photo/2026/02/18/17/50/studio_lichtfang-swan-10131341_1280.jpg" alt="">
    </div>
</body>
</html>
