<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #outerDiv{
            width: 200px;
            margin: auto;
            overflow-x: hidden;
        }
        #innerDiv{
            width: 620px;
            animation-direction: alternate;
            animation-name: movingEle;
            animation-duration: 5s;
            animation-iteration-count: infinite;   
        }
        @keyframes movingEle {
            0%{
                transform: translateX(0px);
            }
            50%{
                transform: translateX(-200px);
            }
            100%{
                transform: translateX(-400px);
            }
        }
    </style>
</head>
<body>
    <div id="outerDiv">
        <div id="innerDiv">
            <img height="200" width="200" src="https://cdn.pixabay.com/photo/2019/01/27/22/33/chipmunk-3959206_1280.jpg" alt="">
            <img height="200" width="200" src="https://cdn.pixabay.com/photo/2014/11/03/17/40/leopard-515509_1280.jpg" alt="">
            <img height="200" width="200" src="https://cdn.pixabay.com/photo/2024/05/22/21/51/dog-8781844_1280.jpg" alt="">
        </div>
    </div>
</body>
</html>
